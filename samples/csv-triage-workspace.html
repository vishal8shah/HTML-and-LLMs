<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV triage workspace | Enterprise HTML</title>
  <style>
:root {
  color-scheme: dark;
  --bg: oklch(14% 0 0);
  --bg-2: oklch(11% 0 0);
  --surface: oklch(17% 0 0);
  --surface-2: oklch(20% 0 0);
  --ink: oklch(96% 0 0);
  --muted: oklch(66% 0 0);
  --faint: oklch(48% 0 0);
  --line: oklch(26% 0 0);
  --line-strong: oklch(34% 0 0);
  --accent: oklch(82% .14 78);
  --accent-2: #ffb43b;
  --accent-ink: oklch(14% 0 0);
  --blue: #62a8ff;
  --green: #63c981;
  --red: #ff6b57;
  --orange: #ff8b3d;
  --shadow: 0 24px 80px rgba(0, 0, 0, .38);
  --radius: 8px;
  --sans: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  --mono: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
}

html[data-theme="light"] {
  color-scheme: light;
  --bg: oklch(98.5% 0 0);
  --bg-2: oklch(96% 0 0);
  --surface: oklch(100% 0 0);
  --surface-2: oklch(94.5% 0 0);
  --ink: oklch(18% 0 0);
  --muted: oklch(45% 0 0);
  --faint: oklch(60% 0 0);
  --line: oklch(88% 0 0);
  --line-strong: oklch(76% 0 0);
  --accent: oklch(78% .14 78);
  --accent-2: #c68509;
  --accent-ink: oklch(18% 0 0);
  --shadow: 0 24px 70px rgba(0, 0, 0, .12);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-width: 320px;
  background:
    radial-gradient(circle at 78% 6%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 34rem),
    linear-gradient(180deg, var(--bg-2), var(--bg) 30rem),
    var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  opacity: .18;
  background-image:
    radial-gradient(circle, color-mix(in srgb, var(--line-strong) 55%, transparent) 1px, transparent 1.5px),
    linear-gradient(color-mix(in srgb, var(--line) 50%, transparent) 1px, transparent 1px),
    linear-gradient(90deg, color-mix(in srgb, var(--line) 50%, transparent) 1px, transparent 1px);
  background-size: 18px 18px, 36px 36px, 36px 36px;
  mask-image: linear-gradient(180deg, #000, transparent 78%);
}

a {
  color: inherit;
}

button,
input,
select,
textarea {
  font: inherit;
}

a:focus-visible,
button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}

.sample-shell {
  width: min(1440px, calc(100% - 40px));
  margin: 0 auto;
}

.sample-header {
  position: sticky;
  top: 0;
  z-index: 30;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(18px);
}

.sample-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  min-height: 72px;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: var(--ink);
  font-family: var(--mono);
  text-decoration: none;
}

.brand-mark {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--accent);
  font-size: 19px;
}

.brand-text {
  display: grid;
  gap: 1px;
  font-size: 13px;
  line-height: 1.15;
  text-transform: uppercase;
}

.brand-text small {
  color: var(--muted);
}

.links {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
}

.links a,
.links button {
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font: 800 12px/1 var(--mono);
  padding: 10px 11px;
  text-decoration: none;
  text-transform: uppercase;
}

.links a:hover,
.links button:hover {
  background: var(--surface);
  color: var(--accent);
}

.theme-toggle {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font: 700 12px/1 var(--mono);
  padding: 8px 11px;
  text-transform: uppercase;
}

.theme-toggle::before {
  content: "";
  width: 22px;
  height: 12px;
  border: 1px solid var(--accent);
  border-radius: 999px;
  background: linear-gradient(90deg, transparent 44%, var(--accent) 45%);
}

.sample-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(360px, .52fr);
  gap: 18px;
  align-items: stretch;
  padding: 38px 0 20px;
}

.hero-panel,
.proof-panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  padding: 26px;
}

.hero-panel {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(320px, .72fr);
  gap: 24px;
  align-items: center;
}

.crumb {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  color: var(--muted);
  font: 700 13px/1.2 var(--mono);
}

.crumb a {
  color: var(--muted);
  text-decoration: none;
}

.crumb span:last-child {
  color: var(--accent);
}

.sample-subnav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 12px 0 26px;
}

.sample-pager {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
}

.sample-pager a,
.sample-pager span {
  display: inline-flex;
  align-items: center;
  min-height: 34px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  color: var(--muted);
  font: 800 11px/1 var(--mono);
  padding: 9px 10px;
  text-decoration: none;
  text-transform: uppercase;
}

.sample-pager a {
  color: var(--ink);
}

.sample-pager a:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.sample-pager span {
  border-color: color-mix(in srgb, var(--accent) 48%, var(--line));
  color: var(--accent);
}

.sample-hero h1 {
  margin: 0;
  font-family: var(--mono);
  font-size: clamp(38px, 5.4vw, 74px);
  font-weight: 500;
  line-height: 1.05;
  letter-spacing: 0;
  text-transform: uppercase;
}

.sample-hero p {
  max-width: 760px;
  margin: 18px 0 0;
  color: var(--muted);
  font-size: 17px;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.stat {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--bg-2);
  padding: 14px;
}

.stat strong {
  display: block;
  color: var(--accent);
  font: 800 24px/1 var(--mono);
}

.stat span {
  display: block;
  margin-top: 6px;
  color: var(--muted);
  font: 700 11px/1.35 var(--mono);
  text-transform: uppercase;
}

.proof-panel {
  display: grid;
  gap: 22px;
}

.proof-panel h2,
.workspace h2,
.panel h2,
.panel h3 {
  margin: 0;
  font: 700 15px/1.35 var(--mono);
  letter-spacing: .03em;
  text-transform: uppercase;
}

.proof-list {
  display: grid;
  gap: 9px;
  color: var(--muted);
  font: 600 13px/1.45 var(--mono);
}

.proof-list span::before {
  content: "✓";
  color: var(--accent);
  margin-right: 9px;
}

.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.badge {
  border: 1px solid var(--line-strong);
  border-radius: 4px;
  color: var(--muted);
  font: 800 11px/1 var(--mono);
  padding: 7px 9px;
}

.badge.good {
  border-color: color-mix(in srgb, var(--accent) 48%, var(--line));
  color: var(--accent);
}

.app-grid {
  display: grid;
  grid-template-columns: 290px minmax(0, 1fr) 360px;
  gap: 14px;
  align-items: start;
  padding: 0 0 78px;
}

.panel,
.workspace {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  box-shadow: 0 12px 34px rgba(0, 0, 0, .16);
}

.panel {
  padding: 18px;
}

.workspace {
  min-height: 620px;
  overflow: hidden;
}

.workspace-head,
.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--line);
  padding: 16px 18px;
}

.workspace-body {
  padding: 18px;
}

.control-group {
  display: grid;
  gap: 14px;
  margin-top: 18px;
}

label,
.label {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font: 760 12px/1.35 var(--mono);
  text-transform: uppercase;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink);
  padding: 11px 12px;
}

input[type="range"] {
  accent-color: var(--accent);
}

textarea {
  min-height: 130px;
  resize: vertical;
}

button,
.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 40px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  background: var(--surface);
  color: var(--ink);
  cursor: pointer;
  font: 820 12px/1 var(--mono);
  padding: 10px 13px;
  text-decoration: none;
  text-transform: uppercase;
}

button.primary,
.button.primary {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--accent-ink);
}

button:hover,
.button:hover {
  border-color: var(--accent);
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tabs button.active {
  border-color: var(--accent);
  color: var(--accent);
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.mini-card {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--bg-2);
  padding: 15px;
}

.mini-card.selected {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 12%, var(--surface));
}

.mini-card h3 {
  margin: 0 0 8px;
  font: 700 16px/1.3 var(--mono);
  text-transform: none;
}

.mini-card p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.metric {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--line);
  padding: 10px 0;
}

.metric:last-child {
  border-bottom: 0;
}

.meter {
  height: 10px;
  border-radius: 999px;
  background: var(--line);
  overflow: hidden;
}

.meter span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), var(--green));
}

.data-table,
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th,
td {
  border-bottom: 1px solid var(--line);
  padding: 10px 9px;
  text-align: left;
  vertical-align: top;
}

th {
  color: var(--faint);
  font: 800 11px/1.25 var(--mono);
  text-transform: uppercase;
}

td {
  color: var(--muted);
}

td strong {
  color: var(--ink);
}

.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  color: var(--muted);
  font: 800 11px/1 var(--mono);
  padding: 5px 8px;
}

.status::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
}

.status.high,
.status.critical,
.status.blocked,
.status.missing {
  color: var(--red);
}

.status.medium,
.status.review,
.status.draft {
  color: var(--accent);
}

.status.low,
.status.ready,
.status.approved,
.status.done {
  color: var(--green);
}

.note {
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  color: var(--ink);
  padding: 13px;
}

.note.warning {
  border-left-color: var(--orange);
}

.note.danger {
  border-left-color: var(--red);
  background: color-mix(in srgb, var(--red) 11%, transparent);
}

.output {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink);
  font: 650 12px/1.55 var(--mono);
  min-height: 190px;
  overflow: auto;
  padding: 14px;
  white-space: pre-wrap;
}

.diagram {
  width: 100%;
  min-height: 300px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background:
    radial-gradient(circle, color-mix(in srgb, var(--line-strong) 58%, transparent) 1px, transparent 1.5px),
    var(--bg-2);
  background-size: 18px 18px;
}

.diagram text {
  fill: var(--ink);
  font: 750 12px var(--mono);
  pointer-events: none;
}

.diagram .node {
  fill: var(--surface);
  stroke: var(--line-strong);
  stroke-width: 1.5;
  cursor: pointer;
}

.diagram .node.active {
  fill: color-mix(in srgb, var(--accent) 13%, var(--surface));
  stroke: var(--accent);
  stroke-width: 2.5;
}

.diagram .node.high {
  stroke: var(--red);
}

.diagram .node.medium {
  stroke: var(--accent);
}

.diagram .node.low {
  stroke: var(--green);
}

.diagram .line {
  fill: none;
  stroke: var(--faint);
  stroke-width: 1.8;
}

.diagram .line.hot {
  stroke: var(--accent);
  stroke-width: 2.6;
}

.diagram .line.danger {
  stroke: var(--red);
}

.diagram .line.dashed {
  stroke-dasharray: 5 5;
}

.impact-presentation-active .app-grid {
  grid-template-columns: 1fr;
}

.impact-presentation-active [data-controls],
.impact-presentation-active [data-inspector] {
  display: none;
}

.impact-presentation-active .workspace {
  min-height: 760px;
}

.impact-presenter-shell {
  display: grid;
  gap: 16px;
}

.impact-presenter-top {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: flex-start;
  padding: 16px;
  border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--line));
  border-radius: 8px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 10%, transparent), transparent 44%),
    var(--bg-2);
}

.impact-presenter-top span,
.panel-label {
  display: block;
  color: var(--accent);
  font: 850 11px/1.2 var(--mono);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.impact-presenter-top h2 {
  margin: 7px 0 0;
  color: var(--ink);
  font-size: clamp(30px, 5vw, 56px);
  letter-spacing: -0.04em;
  line-height: .95;
}

.impact-presenter-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.impact-presenter {
  display: grid;
  grid-template-columns: minmax(180px, 220px) minmax(0, 1fr);
  gap: 14px;
}

.impact-slide-rail {
  display: grid;
  align-content: start;
  gap: 8px;
}

.impact-slide-button {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  min-height: 62px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--bg-2);
  color: var(--muted);
  text-align: left;
}

.impact-slide-button span {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  color: var(--accent);
  font: 900 11px/1 var(--mono);
}

.impact-slide-button.active {
  border-color: color-mix(in srgb, var(--accent) 62%, var(--line));
  background: color-mix(in srgb, var(--accent) 12%, var(--bg-2));
  color: var(--ink);
}

.impact-stage {
  display: grid;
  grid-template-columns: minmax(0, 1.55fr) minmax(240px, .45fr);
  grid-template-areas:
    "map inspector"
    "evidence notes";
  gap: 14px;
}

.impact-map-card,
.impact-inspector,
.impact-evidence-drawer,
.impact-notes {
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--surface) 88%, transparent), var(--bg-2));
  box-shadow: 0 18px 70px color-mix(in srgb, #000 20%, transparent);
}

.impact-map-card {
  position: relative;
  grid-area: map;
  overflow: hidden;
}

.impact-map-card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 50% 42%, color-mix(in srgb, var(--accent) 13%, transparent), transparent 48%);
}

.impact-map {
  position: relative;
  min-height: 430px;
  border: 0;
  border-radius: 8px;
  background:
    radial-gradient(circle, color-mix(in srgb, var(--line-strong) 58%, transparent) 1px, transparent 1.5px),
    color-mix(in srgb, var(--bg-2) 82%, #000);
  background-size: 20px 20px;
}

.diagram .node.spotlight {
  filter: drop-shadow(0 0 14px color-mix(in srgb, var(--accent) 75%, transparent));
}

.diagram .line.critical {
  stroke-dasharray: 10 7;
  animation: dashFlow 1.6s linear infinite;
}

.impact-inspector {
  grid-area: inspector;
  padding: 16px;
}

.impact-inspector .note,
.impact-notes p {
  margin-top: 12px;
}

.muted-text {
  color: var(--muted);
}

.impact-evidence-drawer {
  grid-area: evidence;
  padding: 16px;
  animation: drawerReveal .28s ease both;
}

.impact-notes {
  grid-area: notes;
  padding: 16px;
}

.impact-notes p {
  color: var(--ink);
  font-size: 14px;
}

.impact-timeline {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.impact-timeline-step {
  display: grid;
  gap: 8px;
  min-height: 74px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--bg-2);
  color: var(--muted);
  font: 800 11px/1.25 var(--mono);
}

.impact-timeline-step span {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
}

.impact-timeline-step.complete {
  color: var(--ink);
  border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
}

.impact-timeline-step.current {
  background: color-mix(in srgb, var(--accent) 12%, var(--bg-2));
}

@keyframes dashFlow {
  to {
    stroke-dashoffset: -34;
  }
}

@keyframes drawerReveal {
  from {
    opacity: 0;
    transform: translateY(8px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.matrix {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 6px;
}

.matrix-cell {
  display: grid;
  min-height: 58px;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 5px;
  background: var(--bg-2);
  color: var(--muted);
  font: 800 12px/1 var(--mono);
}

.matrix-cell.active {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 16%, transparent);
  color: var(--accent);
}

.heatmap {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}

.heatmap span {
  min-height: 28px;
  border: 1px solid var(--line);
  border-radius: 4px;
}

.timeline {
  position: relative;
  display: grid;
  gap: 12px;
}

.event {
  display: grid;
  grid-template-columns: 76px minmax(0, 1fr);
  gap: 14px;
  border: 1px solid var(--line);

.switch {

  width: 54px;
  height: 30px;
  flex: 0 0 auto;
}

.switch input {
  position: absolute;
  opacity: 0;
}

.slider {
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: var(--line-strong);
  cursor: pointer;
}

.slider::after {
  content: "";
  position: absolute;
  top: 4px;
  left: 4px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--ink);
  transition: transform 160ms ease;

  background: var(--accent-ink);
}

function $(selector, scope = document) {
  return scope.querySelector(selector);
}

function $$(selector, scope = document) {
  return Array.from(scope.querySelectorAll(selector));
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function statusClass(value) {
  return String(value || "").toLowerCase().replaceAll(" ", "-");
}

function downloadText(filename, text, type = "text/plain;charset=utf-8") {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.append(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

async function copyText(text, button) {
  try {
    await navigator.clipboard.writeText(text);
    const old = button.textContent;
    button.textContent = "Copied";
    setTimeout(() => {
      button.textContent = old;
    }, 1200);
  } catch {
    downloadText("artifact.txt", text);
  }
}

function renderTable(headers, rows) {
  return `<table><thead><tr>${headers.map((header) => `<th>${escapeHtml(header)}</th>`).join("")}</tr></thead><tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
}

function setOutput(text) {
  const output = $("[data-output]");
  if (output) output.textContent = text;
}

function metricCard(value, label) {
  return `<div class="stat"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`;
}

function setupTheme() {
  const html = document.documentElement;
  const stored = localStorage.getItem("enterprise-html-theme");
  html.dataset.theme = stored || "dark";

  function sync() {
    $$("[data-theme-toggle]").forEach((button) => {
      const isLight = html.dataset.theme === "light";
      button.textContent = isLight ? "Dark" : "Light";
      button.setAttribute("aria-label", `Switch to ${isLight ? "dark" : "light"} mode`);
    });
  }

  document.addEventListener("click", (event) => {
    const button = event.target.closest("[data-theme-toggle]");
    if (!button) return;
    html.dataset.theme = html.dataset.theme === "light" ? "dark" : "light";
    localStorage.setItem("enterprise-html-theme", html.dataset.theme);
    sync();
  });
  sync();
}

function renderDecision() {
  renderShell();
  $("[data-workspace-title]").textContent = "Decision model";
  const options = [
    { name: "Guided HTML artifact", speed: 92, confidence: 78, effort: 82, risk: 66, reach: 86, stakeholders: [88, 76, 72, 84, 68], note: "Best for a fast, reviewable artifact that can be attached to a discussion." },
    { name: "Slide-only summary", speed: 76, confidence: 52, effort: 92, risk: 38, reach: 62, stakeholders: [54, 62, 45, 70, 58], note: "Familiar and quick, but weak for interaction, traceability, and reuse." },
    { name: "Platform backlog item", speed: 38, confidence: 88, effort: 44, risk: 82, reach: 78, stakeholders: [74, 86, 90, 60, 82], note: "Most durable for governed integration, but needs prioritization and delivery capacity." }
  ];
  const weights = { speed: 30, confidence: 25, effort: 20, risk: 15, reach: 10 };
  $("[data-controls]").innerHTML = `
    <h2>Weights</h2>
    <div class="control-group">
      ${Object.keys(weights).map((key) => `<label>${key}<input type="range" min="0" max="100" value="${weights[key]}" data-weight="${key}"></label>`).join("")}
    </div>
  `;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy brief</button><button data-download>Download</button>`;
  $("[data-workspace]").innerHTML = `<div class="cards" data-options></div><svg class="diagram" viewBox="0 0 760 260" data-radar aria-label="Decision radar"></svg><pre class="output" data-output></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Stakeholder heatmap</h2><p>Scores reflect fictional review friction and confidence.</p><div class="heatmap" data-heatmap></div><div class="note" data-decision-note></div>`;

  function update() {
    Object.keys(weights).forEach((key) => {
      weights[key] = Number($(`[data-weight="${key}"]`).value);
    });
    const total = Object.values(weights).reduce((sum, value) => sum + value, 0) || 1;
    const scored = options.map((option) => ({
      ...option,
      score: Math.round((option.speed * weights.speed + option.confidence * weights.confidence + option.effort * weights.effort + option.risk * weights.risk + option.reach * weights.reach) / total)
    })).sort((a, b) => b.score - a.score);
    $("[data-options]").innerHTML = scored.map((option, index) => `
      <section class="mini-card ${index === 0 ? "selected" : ""}">
        <h3>${escapeHtml(option.name)}</h3>
        <p>${escapeHtml(option.note)}</p>
        <div class="meter"><span style="width:${option.score}%"></span></div>
        <p><strong>${option.score}/100</strong> weighted fit</p>
      </section>
    `).join("");
    const best = scored[0];
    const center = [380, 132];
    const axes = ["speed", "confidence", "effort", "risk", "reach"];
    const points = axes.map((axis, index) => {
      const angle = -Math.PI / 2 + index * Math.PI * 2 / axes.length;
      const radius = best[axis] * 1.05;
      return [center[0] + Math.cos(angle) * radius, center[1] + Math.sin(angle) * radius];
    });
    $("[data-radar]").innerHTML = `
      ${[45, 75, 105].map((r) => `<polygon points="${axes.map((_, i) => `${center[0] + Math.cos(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * r},${center[1] + Math.sin(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * r}`).join(" ")}" fill="none" stroke="var(--line)"/>`).join("")}
      ${axes.map((axis, i) => `<line class="line" x1="${center[0]}" y1="${center[1]}" x2="${center[0] + Math.cos(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * 118}" y2="${center[1] + Math.sin(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * 118}"/><text x="${center[0] + Math.cos(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * 136 - 28}" y="${center[1] + Math.sin(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * 136}">${axis}</text>`).join("")}
      <polygon points="${points.map((point) => point.join(",")).join(" ")}" fill="color-mix(in srgb, var(--accent) 22%, transparent)" stroke="var(--accent)" stroke-width="2"/>
    `;
    $("[data-heatmap]").innerHTML = best.stakeholders.map((score) => `<span style="background: color-mix(in srgb, var(--accent) ${score}%, var(--bg-2));"></span>`).join("");
    $("[data-decision-note]").textContent = best.note;
    setOutput(`Decision brief draft\n\nRecommendation: ${best.name}\nWeighted fit: ${best.score}/100\nWhy: ${best.note}\n\nReview boundary: this is a structured decision aid, not spend approval, risk acceptance, or governance sign-off.`);

function parseCsv(text) {
  const lines = text.trim().split(/\r?\n/).filter(Boolean);
  if (!lines.length) return [];
  const headers = lines.shift().split(",").map((cell) => cell.trim());
  return lines.map((line) => {
    const cells = line.split(",").map((cell) => cell.trim());
    return Object.fromEntries(headers.map((header, index) => [header, cells[index] || ""]));
  });
}

function toCsv(rows) {
  if (!rows.length) return "";
  const headers = Object.keys(rows[0]);
  return [headers.join(","), ...rows.map((row) => headers.map((header) => row[header]).join(","))].join("\n");
}

      notes: "A briefing page can behave like an application: click any node, keep the map alive, and still show the presenter what to say.",
      evidence: [
        ["EV-2120", "Owner confirmation", "Commerce Platform", "Ready"],
        ["EV-2121", "Rollback decision record", "Release Lead", "Review"],
        ["EV-2122", "Performance comparison", "SRE", "Draft"]
      ]
    },
    {
      title: "Cascade scenarios",
      eyebrow: "Make second-order effects visible",
      focus: ["mobile", "api", "order", "inv", "warehouse"],
      selected: "inv",
      progress: 5,
      notes: "This is where HTML becomes stronger than a static slide. The same data can show channel, platform, batch and operations consequences in one surface.",
      evidence: [
        ["EV-2130", "Mobile retry behavior", "Digital Experience", "Review"],
        ["EV-2131", "Batch replay sample", "Supply Systems", "Ready"],
        ["EV-2132", "Warehouse exception report", "Operations", "Draft"]
      ]
    },
    {
      title: "Mitigations",
      eyebrow: "Tie controls to action",
      focus: ["auth", "api", "order", "pay", "ledger"],
      selected: "auth",
      progress: 6,
      notes: "Keep the boundary honest: this artifact can organize review evidence, but it cannot grant approval, attest controls, or integrate with identity systems by itself.",
      evidence: [
        ["EV-2140", "Token scope review", "Identity", "Ready"],
        ["EV-2141", "Rollback runbook excerpt", "SRE", "Review"],
        ["EV-2142", "Monitoring threshold proposal", "Platform", "Draft"]
      ]
    },
    {
      title: "Summary",
      eyebrow: "Close with what humans can trust",
      focus: ["order", "pay", "ledger"],
      selected: "ledger",
      progress: 7,
      notes: "The close is not that HTML replaces enterprise systems. It is that AI can produce a reviewable artifact that humans can navigate, challenge and carry into approved workflows.",
      evidence: [
        ["EV-2150", "Decision summary", "Release Lead", "Draft"],
        ["EV-2151", "Open questions list", "All owners", "Review"],
        ["EV-2152", "Boundary statement", "Governance", "Ready"]
      ]
    }
  ];
  const timeline = ["Plan", "Design", "Code complete", "Test", "Change window", "Verify", "Close"];
  let selected = "order";
  let riskFilter = "All";
  let slideIndex = 0;
  let presenting = false;
  $("[data-controls]").innerHTML = `<h2>Filters</h2><div class="control-group"><label>Risk<select data-risk><option>All</option><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select></label><button data-critical>Highlight critical path</button><button data-impact-present>Enter presentation mode</button></div>`;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy reviewer checklist</button><button data-impact-present>Present</button>`;
  $("[data-workspace]").innerHTML = `
    <div data-impact-normal>
      <svg class="diagram" viewBox="0 0 1100 420" data-map aria-label="Interactive dependency map"></svg>
      <div data-evidence></div>
    </div>
    <div class="impact-presenter-shell" data-impact-presenter hidden></div>`;
  $("[data-inspector]").innerHTML = `<h2>Selected service</h2><div data-selected></div>`;

  function isCriticalEdge(a, b, focus = criticalPath) {
    return focus.includes(a) && focus.includes(b) && Math.abs(focus.indexOf(a) - focus.indexOf(b)) === 1;
  }

  function renderMap(target, options = {}) {
    const focus = options.focus || [];
    const visible = options.presenter ? nodes : nodes.filter((node) => riskFilter === "All" || node.risk === riskFilter);
    const visibleIds = new Set(visible.map((node) => node.id));
    target.innerHTML = links.map(([a, b]) => {
      const from = nodes.find((node) => node.id === a);
      const to = nodes.find((node) => node.id === b);
      if (!visibleIds.has(a) || !visibleIds.has(b)) return "";
      const hot = isCriticalEdge(a, b, focus) || (a === "api" && b === "order");
      return `<path class="line ${hot ? "hot critical" : ""} ${b === "pay" || b === "ledger" ? "danger" : ""}" d="M${from.x + 150} ${from.y + 34} C${from.x + 205} ${from.y + 34} ${to.x - 55} ${to.y + 34} ${to.x} ${to.y + 34}"></path>`;
    }).join("") + visible.map((node) => {
      const focused = focus.includes(node.id);
      return `<g data-node="${node.id}" class="${focused ? "focused" : ""}"><rect class="node ${node.id === selected ? "active" : ""} ${focused ? "spotlight" : ""} ${statusClass(node.risk)}" x="${node.x}" y="${node.y}" width="150" height="68" rx="8"></rect><text x="${node.x + 16}" y="${node.y + 29}">${escapeHtml(node.label)}</text><text x="${node.x + 16}" y="${node.y + 50}">${escapeHtml(node.risk)} | ${escapeHtml(node.team.split(" ")[0])}</text></g>`;
    }).join("");
    $$("[data-node]", target).forEach((nodeEl) => nodeEl.addEventListener("click", () => {
      selected = nodeEl.dataset.node;
      update();
    }));
  }

  function selectedPanel(current) {
    return `<div class="note"><strong>${escapeHtml(current.label)}</strong><br>Owner: ${escapeHtml(current.owner)}<br>Team: ${escapeHtml(current.team)}<br>Risk: ${escapeHtml(current.risk)}<br>Evidence: ${escapeHtml(current.evidence)}</div><h3>Related controls</h3><p>${current.controls.map((control) => `<span class="badge">${escapeHtml(control)}</span>`).join(" ")}</p><h3>Dependencies</h3><p class="muted-text">Upstream: ${current.upstream.length ? current.upstream.join(", ") : "None"}<br>Downstream: ${current.downstream.length ? current.downstream.join(", ") : "None"}</p>`;
  }

  function renderPresentation() {
    const slide = slideData[slideIndex];
    const current = nodes.find((node) => node.id === selected) || nodes.find((node) => node.id === slide.selected);
    const shell = $("[data-impact-presenter]");
    shell.innerHTML = `
      <div class="impact-presenter-top">
        <div><span>${escapeHtml(slide.eyebrow)}</span><h2>${escapeHtml(slide.title)}</h2></div>
        <div class="impact-presenter-actions">
          <button data-present-prev aria-label="Previous presentation slide">Previous</button>
          <button data-present-next aria-label="Next presentation slide">Next</button>
          <button class="primary" data-present-exit>Exit</button>
        </div>
      </div>
      <div class="impact-presenter">
        <nav class="impact-slide-rail" aria-label="Presentation sections">
          ${slideData.map((item, index) => `<button class="impact-slide-button ${index === slideIndex ? "active" : ""}" data-slide="${index}"><span>0${index + 1}</span>${escapeHtml(item.title)}</button>`).join("")}
        </nav>
        <section class="impact-stage">
          <div class="impact-map-card">
            <svg class="diagram impact-map" viewBox="0 0 1100 420" data-present-map aria-label="Presentation dependency map"></svg>
          </div>
          <aside class="impact-inspector">
            <span class="panel-label">Selected service</span>
            <div data-present-selected>${selectedPanel(current)}</div>
          </aside>
          <section class="impact-evidence-drawer">
            <div class="panel-head"><h3>Evidence drawer</h3><span class="status review">${escapeHtml(slide.title)}</span></div>
            ${renderTable(["ID", "Evidence", "Owner", "State"], slide.evidence.map((row) => [escapeHtml(row[0]), escapeHtml(row[1]), escapeHtml(row[2]), `<span class="status ${row[3] === "Ready" ? "ready" : "review"}">${escapeHtml(row[3])}</span>`]))}
          </section>
          <aside class="impact-notes">
            <span class="panel-label">Presenter notes</span>
            <p>${escapeHtml(slide.notes)}</p>
          </aside>
        </section>
      </div>
      <ol class="impact-timeline" aria-label="Change timeline">
        ${timeline.map((item, index) => `<li class="impact-timeline-step ${index + 1 <= slide.progress ? "complete" : ""} ${index + 1 === slide.progress ? "current" : ""}"><span>${index + 1}</span>${escapeHtml(item)}</li>`).join("")}
      </ol>`;
    renderMap($("[data-present-map]"), { focus: slide.focus, presenter: true });
    $$("[data-slide]").forEach((button) => button.addEventListener("click", () => setSlide(Number(button.dataset.slide))));
    $("[data-present-prev]").addEventListener("click", () => setSlide(slideIndex - 1));
    $("[data-present-next]").addEventListener("click", () => setSlide(slideIndex + 1));
    $("[data-present-exit]").addEventListener("click", () => setPresentation(false));
  }

  function update() {
    const visible = nodes.filter((node) => riskFilter === "All" || node.risk === riskFilter);
    const current = nodes.find((node) => node.id === selected) || visible[0] || nodes[0];
    selected = current.id;
    renderMap($("[data-map]"), { focus: riskFilter === "Critical" ? criticalPath : [] });
    $("[data-selected]").innerHTML = selectedPanel(current);
    $("[data-evidence]").innerHTML = renderTable(["ID", "Document", "Owner", "Status"], visible.map((node, index) => [`EV-${1042 + index}`, escapeHtml(node.evidence), escapeHtml(node.team), `<span class="status ${node.risk === "Critical" ? "review" : "ready"}">${node.risk === "Critical" ? "Review" : "Ready"}</span>`]));
    if (presenting) renderPresentation();
  }

  function setSlide(index) {
    slideIndex = (index + slideData.length) % slideData.length;
    selected = slideData[slideIndex].selected;
    renderPresentation();
  }

  function setPresentation(active) {
    presenting = active;
    document.body.classList.toggle("impact-presentation-active", active);
    $("[data-impact-normal]").hidden = active;
    $("[data-impact-presenter]").hidden = !active;
    if (active) {
      selected = slideData[slideIndex].selected;
      renderPresentation();
      $("[data-impact-presenter]").focus?.();
    } else {
      update();
    }
  }
  $("[data-risk]").addEventListener("change", (event) => {
    riskFilter = event.target.value;
    update();
  });
  $("[data-critical]").addEventListener("click", () => {
    riskFilter = "Critical";
    $("[data-risk]").value = "Critical";
    update();
  });
  $("[data-copy]").addEventListener("click", (event) => {
    const current = nodes.find((node) => node.id === selected);
    copyText(`Reviewer checklist for ${current.label}\n- Confirm owner: ${current.owner} (${current.team})\n- Review evidence: ${current.evidence}\n- Validate upstream dependencies: ${current.upstream.join(", ") || "None"}\n- Validate downstream dependencies: ${current.downstream.join(", ") || "None"}\n- Record decision outside this demo`, event.currentTarget);
  });
  $$("[data-impact-present]").forEach((button) => button.addEventListener("click", () => setPresentation(true)));
  document.addEventListener("keydown", (event) => {
    const target = event.target;
    const isTyping = target && ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
    if (isTyping) return;
    if (event.key.toLowerCase() === "p" && !presenting) {
      event.preventDefault();
      setPresentation(true);
      return;
    }
    if (!presenting) return;
    if (event.key === "Escape") {
      event.preventDefault();
      setPresentation(false);
    } else if (event.key === "ArrowRight") {
      event.preventDefault();
      setSlide(slideIndex + 1);
    } else if (event.key === "ArrowLeft") {
      event.preventDefault();
      setSlide(slideIndex - 1);
    } else if (/^[1-6]$/.test(event.key)) {
      event.preventDefault();
      setSlide(Number(event.key) - 1);
    }
  });
  update();
}

function renderPr() {
  renderShell();
  $("[data-workspace-title]").textContent = "Review aid";
  const findings = [
    ["High", "migration.sql", "Rollback path does not cover rows inserted after upgrade."],
    ["High", "api/client.ts", "New outbound host needs security owner review."],

  let severity = "All";
  $("[data-controls]").innerHTML = `<h2>Severity</h2><div class="control-group">${["All", "High", "Medium", "Low"].map((item) => `<button data-sev="${item}">${item}</button>`).join("")}</div>`;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy review summary</button>`;
  $("[data-workspace]").innerHTML = `<div class="output" data-diff></div><div data-findings></div><pre class="output" data-output></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Ownership matrix</h2>${renderTable(["Area", "Owner", "Review"], [["Data migration", "Platform", '<span class="status high">Required</span>'], ["Security", "AppSec", '<span class="status high">Required</span>'], ["UX copy", "Product", '<span class="status medium">Optional</span>']])}`;
  function update() {
    const visible = findings.filter((finding) => severity === "All" || finding[0] === severity);
    $("[data-diff]").textContent = `@@ fictional diff excerpt @@\n+ await client.post("/external/review", payload)\n+ await db.execute(migrationStatement)\n- return null\n+ return { status: "pending_review" }`;
    $("[data-findings]").innerHTML = renderTable(["Severity", "File", "Reviewer focus"], visible.map((finding) => [`<span class="status ${statusClass(finding[0])}">${finding[0]}</span>`, escapeHtml(finding[1]), escapeHtml(finding[2])]));
    setOutput(`PR review summary (${severity})\n\n${visible.map((finding) => `- [${finding[0]}] ${finding[1]}: ${finding[2]}`).join("\n")}\n\nBoundary: reviewer remains accountable for final judgment.`);
  }
  $$("[data-sev]").forEach((button) => button.addEventListener("click", () => {
    severity = button.dataset.sev;
    update();
  }));
  $("[data-copy]").addEventListener("click", (event) => copyText($("[data-output]").textContent, event.currentTarget));
  update();
}

function renderIncident() {
  renderShell();
  $("[data-workspace-title]").textContent = "Incident timeline";
  const events = [
    ["09:12", "Detect", "Alert fired for elevated checkout failures."],
    ["09:18", "Assess", "On-call linked failures to payment timeout changes."],
    ["09:31", "Mitigate", "Feature flag disabled for high-volume path."],

  ];
  let filter = "All";
  $("[data-controls]").innerHTML = `<h2>Event controls</h2><div class="control-group"><label>Type<select data-type-filter><option>All</option><option>Detect</option><option>Assess</option><option>Mitigate</option><option>Recover</option><option>Follow-up</option></select></label><label>Time<input data-time value="10:30"></label><label>Type<select data-new-type><option>Follow-up</option><option>Detect</option><option>Assess</option><option>Mitigate</option><option>Recover</option></select></label><label>Note<input data-note value="Schedule learning review."></label><button class="primary" data-add>Add event</button></div>`;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy postmortem</button>`;
  $("[data-workspace]").innerHTML = `<div class="timeline" data-timeline></div><pre class="output" data-output></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Five whys</h2>${["Why alert?", "Timeouts increased", "Why timeouts?", "Config changed", "Why not caught?", "Fixture missed peak load"].map((item) => `<div class="note">${escapeHtml(item)}</div>`).join("")}`;
  function update() {
    const visible = events.filter((event) => filter === "All" || event[1] === filter);
    $("[data-timeline]").innerHTML = visible.map((event) => `<section class="event"><time>${event[0]}</time><div><strong>${event[1]}</strong><p>${event[2]}</p></div></section>`).join("");
    setOutput(`Incident postmortem draft\n\n${events.map((event) => `${event[0]} - ${event[1]} - ${event[2]}`).join("\n")}\n\nBoundary: official incident record remains in approved operational tooling.`);
  }
  $("[data-type-filter]").addEventListener("change", (event) => {
    filter = event.target.value;
    update();
  });
  $("[data-add]").addEventListener("click", () => {
    events.push([$("[data-time]").value, $("[data-new-type]").value, $("[data-note]").value]);
    events.sort((a, b) => a[0].localeCompare(b[0]));
    update();
  });
  $("[data-copy]").addEventListener("click", (event) => copyText($("[data-output]").textContent, event.currentTarget));
  update();
}

function renderControl() {
  renderShell();
  $("[data-workspace-title]").textContent = "Evidence readiness";
  const items = [
    ["Change ticket", "CHANGE-01", "Asha", "Ready"],
    ["Peer review notes", "SDLC-04", "Ben", "Needs review"],
    ["Regression test evidence", "TEST-02", "Mina", "Ready"],
    ["Rollback notes", "CHANGE-01", "Leo", "Missing"],
    ["Data classification", "DATA-01", "Sam", "Needs review"],
    ["Monitoring screenshot", "OPS-03", "Asha", "Ready"]
  ];
  $("[data-controls]").innerHTML = `<h2>Actions</h2><div class="control-group"><button class="primary" data-ready>Mark ready items</button><button data-print>Print pack</button></div>`;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy readiness summary</button>`;
  $("[data-workspace]").innerHTML = `<div class="hero-stats" data-readiness></div><div class="heatmap" data-heatmap></div><div data-table></div><pre class="output" data-output></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Control caveat</h2><div class="note warning">Readiness is not attestation. Each evidence item must be validated against the approved control and source system.</div>`;
  function update() {
    const ready = items.filter((item) => item[3] === "Ready").length;
    const missing = items.filter((item) => item[3] === "Missing").length;
    $("[data-readiness]").innerHTML = [["Ready", ready], ["Review", items.length - ready - missing], ["Missing", missing]].map(([label, value]) => metricCard(value, label)).join("");
    $("[data-heatmap]").innerHTML = items.map((item) => `<span style="background:${item[3] === "Ready" ? "var(--green)" : item[3] === "Missing" ? "var(--red)" : "var(--accent)"}"></span>`).join("");
    $("[data-table]").innerHTML = renderTable(["Evidence", "Control", "Owner", "Status"], items.map((item, index) => [escapeHtml(item[0]), escapeHtml(item[1]), escapeHtml(item[2]), `<select data-status="${index}"><option ${item[3] === "Ready" ? "selected" : ""}>Ready</option><option ${item[3] === "Needs review" ? "selected" : ""}>Needs review</option><option ${item[3] === "Missing" ? "selected" : ""}>Missing</option></select>`]));
    setOutput(`Control evidence readiness\n\nReady: ${ready}/${items.length}\n${items.map((item) => `- ${item[0]} (${item[1]}): ${item[3]} | owner: ${item[2]}`).join("\n")}\n\nBoundary: not audit attestation.`);
    $$("[data-status]").forEach((select) => select.addEventListener("change", () => {
      items[Number(select.dataset.status)][3] = select.value;
      update();
    }));
  }
  $("[data-ready]").addEventListener("click", () => {
    items.forEach((item) => {
      if (item[3] === "Needs review") item[3] = "Ready";
    });
    update();
  });
  $("[data-print]").addEventListener("click", () => window.print());
  $("[data-copy]").addEventListener("click", (event) => copyText($("[data-output]").textContent, event.currentTarget));
  update();
}

function renderFlags() {
  renderShell();
  $("[data-workspace-title]").textContent = "Flag rollout risk";
  const defaults = {
    "checkout-v2": false,
    "payment-routing": false,
    "new-dashboard": true,
    "bulk-export": false,
    "legacy-fallback": true,
    "customer-copy-refresh": true
  };
  const dependencies = {
    "checkout-v2": ["payment-routing", "legacy-fallback"],
    "bulk-export": ["new-dashboard"],
    "payment-routing": ["legacy-fallback"]
  };
  const key = "enterprise-html-flags-v2";
  let state = JSON.parse(localStorage.getItem(key) || "null") || { ...defaults };
  $("[data-controls]").innerHTML = `<h2>Rollout</h2><div class="control-group"><label>Target<select data-target><option>Internal pilot</option><option>5% customers</option><option>25% customers</option><option>100% customers</option></select></label><button data-reset>Reset</button></div>`;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy JSON diff</button><button data-download>Download diff</button>`;
  $("[data-workspace]").innerHTML = `<div data-flags></div><svg class="diagram" viewBox="0 0 760 250" data-flag-map aria-label="Feature flag dependency graph"></svg><pre class="output" data-output></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Risk analysis</h2><div data-warnings></div>`;
  function update() {
    localStorage.setItem(key, JSON.stringify(state));
    $("[data-flags]").innerHTML = Object.keys(state).map((flag) => `<div class="toggle-row"><div><strong>${escapeHtml(flag)}</strong><p>${dependencies[flag] ? `Depends on: ${dependencies[flag].join(", ")}` : "No sample dependency"}</p></div><label class="switch"><input type="checkbox" data-flag="${flag}" ${state[flag] ? "checked" : ""}><span class="slider"></span></label></div>`).join("");
    const diff = Object.fromEntries(Object.entries(state).filter(([flag, value]) => defaults[flag] !== value));
    const warnings = Object.entries(dependencies).filter(([flag, deps]) => state[flag] && deps.some((dep) => !state[dep]));
    const blast = Object.values(state).filter(Boolean).length * ($("[data-target]").selectedIndex + 1);
    $("[data-flag-map]").innerHTML = `
      <rect class="node ${state["checkout-v2"] ? "active" : ""}" x="60" y="70" width="150" height="58" rx="7"></rect><text x="88" y="106">checkout-v2</text>
      <rect class="node ${state["payment-routing"] ? "active" : ""}" x="300" y="35" width="170" height="58" rx="7"></rect><text x="323" y="71">payment-routing</text>
      <rect class="node ${state["legacy-fallback"] ? "active" : ""}" x="300" y="145" width="170" height="58" rx="7"></rect><text x="324" y="181">legacy-fallback</text>
      <rect class="node ${state["bulk-export"] ? "active" : ""}" x="540" y="70" width="150" height="58" rx="7"></rect><text x="575" y="106">bulk-export</text>
      <path class="line hot" d="M210 99h90"></path><path class="line hot" d="M210 99 C260 140 270 174 300 174"></path><path class="line dashed" d="M470 64 C520 64 520 99 540 99"></path>`;
    setOutput(JSON.stringify(diff, null, 2) || "{}");
    $("[data-warnings]").innerHTML = `<div class="stat"><strong>${blast}</strong><span>Blast-radius score</span></div>` + (warnings.length ? warnings.map(([flag, deps]) => `<div class="note danger">${escapeHtml(flag)} is on, but dependency is off: ${escapeHtml(deps.filter((dep) => !state[dep]).join(", "))}</div>`).join("") : `<div class="note">No dependency warnings in this fictional flag set.</div>`) + `<div class="note">Target: ${escapeHtml($("[data-target]").value)}</div>`;
    $$("[data-flag]").forEach((input) => input.addEventListener("change", () => {
      state[input.dataset.flag] = input.checked;
      update();
    }));
  }
  $("[data-target]").addEventListener("change", update);
  $("[data-reset]").addEventListener("click", () => {
    state = { ...defaults };
    localStorage.removeItem(key);
    update();
  });
  $("[data-copy]").addEventListener("click", (event) => copyText($("[data-output]").textContent, event.currentTarget));
  $("[data-download]").addEventListener("click", () => downloadText("feature-flag-diff.json", $("[data-output]").textContent, "application/json;charset=utf-8"));
  update();
}

};

renderers[sample.type]();
